<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Matriz de Adyacencia Pro - Pesos Claros</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #1b4079;
            --secondary: #7c3aed;
            --max-color: #f59e0b;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background-color: var(--bg);
            padding: 30px;
            color: #1e293b;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            max-width: 1100px;
            margin: auto;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 { color: var(--primary); font-weight: 700; margin: 0; }

        .btn-group { display: flex; gap: 10px; }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }

        .btn-back { background: var(--primary); color: white; }
        .btn-pdf { background: #2d5a27; color: white; }
        .btn:hover { filter: brightness(1.2); }

        table {
            border-collapse: separate;
            border-spacing: 5px;
            width: 100%;
            margin-top: 20px;
            overflow-x: auto;
            display: block;
        }

        th, td {
            min-width: 60px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        th { background: var(--primary); color: white; }

        .calc-cell {
            background: #f1f5f9;
            color: var(--secondary);
            font-weight: 700;
        }

        .is-max {
            background: var(--max-color) !important;
            color: white !important;
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.4);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .stat-card {
            padding: 20px;
            border-radius: 20px;
            background: #ffffff;
            border-left: 5px solid var(--primary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            text-align: center;
        }

        .stat-label { font-size: 0.75em; color: #94a3b8; font-weight: 700; display: block; margin-bottom: 8px; }
        .stat-value { font-size: 1.8em; font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>

<div class="container" id="reporte">
    <div class="header-flex">
        <h1>Matriz de Adyacencia</h1>
        <div class="btn-group">
            <button onclick="volverEditor()" class="btn btn-back">← Volver al Editor</button>
            <button onclick="descargarPDFMatriz()" class="btn btn-pdf">Descargar PDF</button>
        </div>
    </div>
    
    <div id="matriz-render"></div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">MAX. SUMA FILAS</span>
            <span id="max-sum-f" class="stat-value">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">MAX. SUMA COLUMNAS</span>
            <span id="max-sum-c" class="stat-value">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">MAX. CANT. FILAS</span>
            <span id="max-cont-f" class="stat-value">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">MAX. CANT. COLUMNAS</span>
            <span id="max-cont-c" class="stat-value">0</span>
        </div>
    </div>
</div>

<script>
let lastDataHash = "";

function generarMatrizPro() {
    const rawData = localStorage.getItem("grafoData");
    
    if (!rawData) {
        document.getElementById("matriz-render").innerHTML = "<div style='text-align:center; padding:20px;'><h3>No hay datos disponibles.</h3><p>Crea nodos en el editor primero.</p></div>";
        return;
    }

    if (rawData === lastDataHash) return;
    lastDataHash = rawData;

    const data = JSON.parse(rawData);
    const nodos = data.nodos.map(n => n.nombre);
    const aristas = data.aristas;
    const n = nodos.length;

    if (n === 0) {
        document.getElementById("matriz-render").innerHTML = "<h3>El grafo está vacío.</h3>";
        return;
    }

    let matriz = Array.from({ length: n }, () => Array(n).fill(0));
    
    // Llenar matriz con RESTRICCIÓN DE NEGATIVOS
    aristas.forEach(a => {
        const i = nodos.indexOf(a.from);
        const j = nodos.indexOf(a.to);
        if (i !== -1 && j !== -1) {
            // Aplicamos la restricción: mínimo 0
            const pesoSeguro = Math.max(0, parseInt(a.peso) || 0);
            matriz[i][j] = pesoSeguro;
        }
    });

    let sumF = matriz.map(row => row.reduce((a, b) => a + b, 0));
    let contF = matriz.map(row => row.filter(x => x !== 0).length);
    let sumC = Array(n).fill(0), contC = Array(n).fill(0);
    
    for (let j = 0; j < n; j++) {
        for (let i = 0; i < n; i++) {
            sumC[j] += matriz[i][j];
            if (matriz[i][j] !== 0) contC[j]++;
        }
    }

    const maxSF = Math.max(...sumF), maxSC = Math.max(...sumC);
    const maxCF = Math.max(...contF), maxCC = Math.max(...contC);

    let html = `<table><tr><th>NODOS</th>`;
    nodos.forEach(nod => html += `<th>${nod}</th>`);
    html += `<th class="calc-cell">SUMA Σ</th><th class="calc-cell">CANT #</th></tr>`;

    for (let i = 0; i < n; i++) {
        html += `<tr><th>${nodos[i]}</th>`;
        for (let j = 0; j < n; j++) {
            html += `<td>${matriz[i][j]}</td>`;
        }
        html += `<td class="calc-cell ${sumF[i]===maxSF && maxSF>0 ? 'is-max' : ''}">${sumF[i]}</td>`;
        html += `<td class="calc-cell ${contF[i]===maxCF && maxCF>0 ? 'is-max' : ''}">${contF[i]}</td></tr>`;
    }

    html += `<tr><th class="calc-cell">SUMA Σ</th>`;
    sumC.forEach(s => html += `<td class="calc-cell ${s===maxSC && maxSC>0 ? 'is-max' : ''}">${s}</td>`);
    html += `<td colspan="2" style="background:transparent; border:none;"></td></tr>`;

    html += `<tr><th class="calc-cell">CANT #</th>`;
    contC.forEach(c => html += `<td class="calc-cell ${c===maxCC && maxCC>0 ? 'is-max' : ''}">${c}</td>`);
    html += `<td colspan="2" style="background:transparent; border:none;"></td></tr></table>`;

    document.getElementById("matriz-render").innerHTML = html;
    
    document.getElementById("max-sum-f").innerText = maxSF;
    document.getElementById("max-sum-c").innerText = maxSC;
    document.getElementById("max-cont-f").innerText = maxCF;
    document.getElementById("max-cont-c").innerText = maxCC;
}

async function descargarPDFMatriz() {
    const { jsPDF } = window.jspdf;
    const element = document.getElementById('reporte');
    const canvas = await html2canvas(element, { scale: 2 });
    const imgData = canvas.toDataURL('image/png');
    const pdf = new jsPDF('l', 'mm', 'a4');
    const imgProps = pdf.getImageProperties(imgData);
    const pdfWidth = pdf.internal.pageSize.getWidth();
    const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
    pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
    pdf.save("matriz-reporte.pdf");
}
function volverEditor(){
    const data = localStorage.getItem("grafoData");

    if(data){
        sessionStorage.setItem("grafoDataTemp", data);
    }

    window.location.href = "index.html";
}
window.onload = () => {
    generarMatrizPro();
    setInterval(generarMatrizPro, 1000);
};

</script>
</body>
</html>
