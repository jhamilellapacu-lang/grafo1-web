<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Matriz de Adyacencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2196f3; --accent: #470f70; }
        body { font-family: 'Comfortaa', sans-serif; padding: 40px; background: #f0f4f8; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: center; }
        th { background: var(--accent); color: white; }
        .max-cell { background: #ffeb3b; font-weight: bold; }
        .summary { background: #e3f2fd; font-weight: bold; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Matriz de Adyacencia Dinámica</h1>
        <button onclick="window.location.href='index.html'">⬅ Volver al Editor</button>
        <div id="table-container"></div>
    </div>

    <script>
        function render() {
            const nodos = JSON.parse(localStorage.getItem("nodos_pro")) || [];
            const aristas = JSON.parse(localStorage.getItem("aristas_pro")) || [];
            const nNames = nodos.map(n => n.nombre);
            const size = nNames.length;
            
            let matriz = Array.from({length: size}, () => Array(size).fill(0));
            aristas.forEach(a => {
                const i = nNames.indexOf(a.from);
                const j = nNames.indexOf(a.to);
                if(i !== -1 && j !== -1) matriz[i][j] = a.peso;
            });

            let html = `<table><tr><th>Nodos</th>`;
            nNames.forEach(name => html += `<th>${name}</th>`);
            html += `<th class="summary">Suma</th><th class="summary">Cant.</th></tr>`;

            let sumasFilas = matriz.map(r => r.reduce((a,b) => a+b, 0));
            let cantFilas = matriz.map(r => r.filter(x => x > 0).length);
            let maxSumF = Math.max(...sumasFilas);
            let maxCantF = Math.max(...cantFilas);

            matriz.forEach((row, i) => {
                html += `<tr><th>${nNames[i]}</th>`;
                row.forEach(val => html += `<td>${val}</td>`);
                html += `<td class="${sumasFilas[i] === maxSumF && maxSumF > 0 ? 'max-cell' : 'summary'}">${sumasFilas[i]}</td>`;
                html += `<td class="${cantFilas[i] === maxCantF && maxCantF > 0 ? 'max-cell' : 'summary'}">${cantFilas[i]}</td></tr>`;
            });

            document.getElementById('table-container').innerHTML = html;
        }
        render();
    </script>
</body>
</html>
