<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Matriz de Adyacencia Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #1b4079; --bg: #f8fafc; }
        body { font-family: 'Comfortaa', cursive; background: var(--bg); padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; max-width: 1000px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: center; }
        th { background: var(--primary); color: white; }
        .is-max { background: #f59e0b !important; color: white; font-weight: bold; }
        .btn { padding: 10px 20px; border-radius: 10px; cursor: pointer; text-decoration: none; font-weight: bold; border: none; }
        .btn-back { background: var(--primary); color: white; }
        .btn-pdf { background: #2d5a27; color: white; margin-left: 10px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .card { background: #f1f5f9; padding: 15px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container" id="reporte">
    <div class="header">
        <h1>📊 Matriz de Pesos</h1>
        <div>
            <a href="index.html" class="btn btn-back">← Volver</a>
            <button onclick="descargarPDFMatriz()" class="btn btn-pdf">Descargar PDF</button>
        </div>
    </div>
    
    <div id="tabla-area"></div>

    <div class="stats">
        <div class="card"><span>Max Suma Fila</span><h2 id="msf">0</h2></div>
        <div class="card"><span>Max Suma Col</span><h2 id="msc">0</h2></div>
        <div class="card"><span>Max Cant Fila</span><h2 id="mcf">0</h2></div>
        <div class="card"><span>Max Cant Col</span><h2 id="mcc">0</h2></div>
    </div>
</div>

<script>
function generar() {
    const data = JSON.parse(localStorage.getItem("grafoData") || '{"nodos":[], "aristas":[]}');
    const n = data.nodos.length;
    if (n === 0) return document.getElementById("tabla-area").innerHTML = "Crea nodos primero.";

    const nombres = data.nodos.map(nd => nd.nombre);
    let matriz = Array.from({length: n}, () => Array(n).fill(0));
    
    // RESTRICCIÓN: Math.max(0, ...) para asegurar positivos
    data.aristas.forEach(a => {
        const i = nombres.indexOf(a.from), j = nombres.indexOf(a.to);
        if (i!==-1 && j!==-1) matriz[i][j] = Math.max(0, parseInt(a.peso) || 0);
    });

    let sumF = matriz.map(r => r.reduce((a,b)=>a+b,0));
    let contF = matriz.map(r => r.filter(x=>x>0).length);
    let sumC = Array(n).fill(0), contC = Array(n).fill(0);
    for(let j=0; j<n; j++) matriz.forEach((r,i) => { sumC[j]+=r[j]; if(r[j]>0) contC[j]++; });

    let html = `<table><tr><th>ID</th>${nombres.map(nm=>`<th>${nm}</th>`).join('')}<th>SUMA</th></tr>`;
    matriz.forEach((r, i) => {
        html += `<tr><th>${nombres[i]}</th>${r.map(v=>`<td>${v}</td>`).join('')}<td>${sumF[i]}</td></tr>`;
    });
    html += `<tr><th>SUMA</th>${sumC.map(s=>`<td>${s}</td>`).join('')}<td>-</td></tr></table>`;

    document.getElementById("tabla-area").innerHTML = html;
    document.getElementById("msf").innerText = Math.max(...sumF);
    document.getElementById("msc").innerText = Math.max(...sumC);
    document.getElementById("mcf").innerText = Math.max(...contF);
    document.getElementById("mcc").innerText = Math.max(...contC);
}

async function descargarPDFMatriz() {
    const { jsPDF } = window.jspdf;
    const canvas = await html2canvas(document.getElementById('reporte'));
    const pdf = new jsPDF('l', 'mm', 'a4');
    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 10, 270, 0);
    pdf.save("matriz-reporte.pdf");
}

window.onload = generar;
</script>
</body>
</html>
