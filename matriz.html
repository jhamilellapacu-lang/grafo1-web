<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Matriz de Adyacencia</title>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600&display=swap" rel="stylesheet">
<style>
body{
font-family:'Comfortaa', sans-serif;
background:#f1f8f5;
text-align:center;
}
table{
margin:auto;
border-collapse:collapse;
background:white;
}
td,th{
border:1px solid #1b4332;
padding:8px 12px;
}
</style>
</head>
<body>

<h2>MATRIZ DE ADYACENCIA</h2>
<div id="matrix"></div>

<script>
let data = JSON.parse(localStorage.getItem("grafo"));
if(!data){
document.getElementById("matrix").innerHTML="No hay datos.";
}else{
let nodes = data.nodes;
let edges = data.edges;

let table="<table><tr><th></th>";
nodes.forEach(n=> table+=`<th>${n.name}</th>`);
table+="</tr>";

nodes.forEach(row=>{
table+=`<tr><th>${row.name}</th>`;
nodes.forEach(col=>{
let edge = edges.find(e=>e.from===row.id && e.to===col.id);
table+=`<td>${edge?edge.weight:0}</td>`;
});
table+="</tr>";
});

table+="</table>";
document.getElementById("matrix").innerHTML=table;
}
</script>

</body>
</html>
