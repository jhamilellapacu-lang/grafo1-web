<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Matriz de Adyacencia Pro - Pesos Claros</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1b4079;
            --secondary: #7c3aed;
            --max-color: #f59e0b;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background-color: var(--bg);
            padding: 30px;
            color: #1e293b;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            max-width: 1100px;
            margin: auto;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 { color: var(--primary); font-weight: 700; margin: 0; }

        .btn-back {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }

        table {
            border-collapse: separate;
            border-spacing: 5px;
            width: 100%;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        th { background: var(--primary); color: white; }

        /* Celdas de cálculos laterales y de abajo */
        .calc-cell {
            background: #f1f5f9;
            color: var(--secondary);
            font-weight: 700;
        }

        /* Resaltado de valor máximo */
        .is-max {
            background: var(--max-color) !important;
            color: white !important;
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.4);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .stat-card {
            padding: 20px;
            border-radius: 20px;
            background: #ffffff;
            border-left: 5px solid var(--primary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            text-align: center;
        }

        .stat-label { font-size: 0.75em; color: #94a3b8; font-weight: 700; display: block; margin-bottom: 8px; }
        .stat-value { font-size: 1.8em; font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h1>Matriz de Adyacencia</h1>
        <a href="index.html" class="btn-back">← Volver al Editor</a>
    </div>
    
    <div id="matriz-render"></div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">MAX. SUMA FILAS</span>
            <span id="max-sum-f" class="stat-value">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">MAX. SUMA COLUMNAS</span>
            <span id="max-sum-c" class="stat-value">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">MAX. CANT. FILAS</span>
            <span id="max-cont-f" class="stat-value">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">MAX. CANT. COLUMNAS</span>
            <span id="max-cont-c" class="stat-value">0</span>
        </div>
    </div>
</div>

<script>
function generarMatrizPro() {
    // 1. Obtener datos de LocalStorage

    const data = JSON.parse(localStorage.getItem("grafoData"));
    if (!data) return;

    const nodos = data.nodos.map(n => n.nombre);
    const aristas = data.aristas;

    const n = nodos.length;
    let matriz = Array.from({ length: n }, () => Array(n).fill(0));

    if (nodos.length === 0) {
        document.getElementById("matriz-render").innerHTML = "<h3>No hay nodos creados. Regresa al editor.</h3>";
        return;
    }

    const n = nodos.length;
    // Crear matriz vacía de ceros
    let matriz = Array.from({ length: n }, () => Array(n).fill(0));

    // Llenar matriz con pesos
    aristas.forEach(a => {
        const i = nodos.indexOf(a.from);
        const j = nodos.indexOf(a.to);
        if (i !== -1 && j !== -1) {
            matriz[i][j] = a.peso;
        }
    });

    // 2. Cálculos de Filas (Suma y Conteo)
    let sumF = matriz.map(row => row.reduce((a, b) => a + b, 0));
    let contF = matriz.map(row => row.filter(x => x !== 0).length);

    // 3. Cálculos de Columnas (Suma y Conteo)
    let sumC = Array(n).fill(0);
    let contC = Array(n).fill(0);
    for (let j = 0; j < n; j++) {
        for (let i = 0; i < n; i++) {
            sumC[j] += matriz[i][j];
            if (matriz[i][j] !== 0) contC[j]++;
        }
    }

    // 4. Encontrar Máximos para resaltar
    const maxSF = Math.max(...sumF);
    const maxSC = Math.max(...sumC);
    const maxCF = Math.max(...contF);
    const maxCC = Math.max(...contC);

    // 5. Construcción de la Tabla HTML
    let tablaHtml = `<table>`;
    
    // Encabezado
    tablaHtml += `<tr><th>NODOS</th>`;
    nodos.forEach(nod => tablaHtml += `<th>${nod}</th>`);
    tablaHtml += `<th class="calc-cell">SUMA Σ</th><th class="calc-cell">CANT #</th></tr>`;

    // Filas de Datos
    for (let i = 0; i < n; i++) {
        tablaHtml += `<tr><th>${nodos[i]}</th>`;
        for (let j = 0; j < n; j++) {
            tablaHtml += `<td>${matriz[i][j]}</td>`;
        }
        // Celda Suma Fila
        const classSumF = (sumF[i] === maxSF && maxSF > 0) ? 'is-max' : '';
        tablaHtml += `<td class="calc-cell ${classSumF}">${sumF[i]}</td>`;
        // Celda Cantidad Fila
        const classContF = (contF[i] === maxCF && maxCF > 0) ? 'is-max' : '';
        tablaHtml += `<td class="calc-cell ${classContF}">${contF[i]}</td>`;
        tablaHtml += `</tr>`;
    }

    // Fila FINAL de Suma de Columnas
    tablaHtml += `<tr><th class="calc-cell">SUMA Σ</th>`;
    sumC.forEach(s => {
        const classSumC = (s === maxSC && maxSC > 0) ? 'is-max' : '';
        tablaHtml += `<td class="calc-cell ${classSumC}">${s}</td>`;
    });
    tablaHtml += `<td colspan="2" style="border:none; background:transparent"></td></tr>`;

    // Fila FINAL de Conteo de Columnas
    tablaHtml += `<tr><th class="calc-cell">CANT #</th>`;
    contC.forEach(c => {
        const classContC = (c === maxCC && maxCC > 0) ? 'is-max' : '';
        tablaHtml += `<td class="calc-cell ${classContC}">${c}</td>`;
    });
    tablaHtml += `<td colspan="2" style="border:none; background:transparent"></td></tr>`;
    
    tablaHtml += `</table>`;

    // 6. Renderizar y actualizar tarjetas
    document.getElementById("matriz-render").innerHTML = tablaHtml;
    document.getElementById("max-sum-f").innerText = maxSF;
    document.getElementById("max-sum-c").innerText = maxSC;
    document.getElementById("max-cont-f").innerText = maxCF;
    document.getElementById("max-cont-c").innerText = maxCC;
}

// Ejecutar al cargar la página
window.onload = generarMatrizPro;
</script>

</body>
</html>
