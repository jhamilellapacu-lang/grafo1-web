<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Graph Designer - Pesos Claros</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1b4079; --bg: #f8fafc; }
        body { font-family: 'Comfortaa', cursive; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        #sidebar { width: 320px; background: white; padding: 20px; box-shadow: 2px 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 15px; z-index: 100; overflow-y: auto; }
        .step { padding: 12px; border: 2px solid #edf2f7; border-radius: 12px; }
        h2 { font-size: 1rem; color: var(--primary); margin-top: 0; }
        input, button { width: 100%; padding: 8px; margin-top: 5px; border-radius: 8px; border: 1px solid #cbd5e0; box-sizing: border-box; font-family: inherit; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        .secondary { background: #718096; }
        .danger { background: #e53e3e; }
        #canvas-container { flex-grow: 1; padding: 20px; position: relative; }
        #area { width: 100%; height: 100%; background: white; border-radius: 30px; position: relative; border: 2px dashed #cbd5e0; overflow: hidden; }
        .nodo { width: 50px; height: 50px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; position: absolute; transform: translate(-50%, -50%); cursor: grab; z-index: 10; border: 3px solid white; user-select: none; }
        .nodo.selected { background: #ff9800 !important; box-shadow: 0 0 15px rgba(255, 152, 0, 0.6); }
        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        path { pointer-events: auto; cursor: pointer; stroke-width: 3; fill: none; transition: stroke 0.2s; }
        path:hover { stroke: #ff9800; stroke-width: 5; }
        .label-peso { font-weight: bold; paint-order: stroke; stroke: white; stroke-width: 4px; font-size: 14px; cursor: pointer; pointer-events: auto; }
    </style>
</head>
<body>

<div id="sidebar">
    <h1 style="font-size: 1.3rem; color: var(--primary);">Diseña tu grafo</h1>
    <div class="step">
        <h2>1. Nodo</h2>
        <input type="text" id="nodeName" placeholder="Nombre (Ej: A)">
        <button onclick="agregarNodo()">Añadir Nodo</button>
        <input type="text" id="newNodeName" placeholder="Nuevo nombre" style="margin-top:10px">
        <button class="secondary" onclick="editarNombreNodo()">Renombrar Seleccionado</button>
    </div>
    <div class="step">
        <h2>2. Aristas</h2>
        <p style="font-size: 0.8rem;">Click en Nodo A, luego en Nodo B para conectar.</p>
        <button id="btn-del-edge" class="danger" onclick="borrarAristaSeleccionada()" style="display:none">Eliminar Arista</button>
    </div>
    <div class="step">
        <h2>3. Datos</h2>
        <button onclick="exportarJSON()">Exportar JSON</button>
        <button onclick="importarJSON()" class="secondary" style="margin-top:5px">Importar JSON</button>
        <button class="danger" onclick="limpiarTodo()" style="margin-top:10px">Limpiar Todo</button>
    </div>
    <button onclick="guardarYIrMatriz()" style="background:#2d5a27">Ver Matriz →</button>
</div>

<div id="canvas-container">
    <div id="area">
        <svg id="svg">
            <defs>
                <marker id="arrow" markerWidth="10" markerHeight="10" refX="20" refY="5" orient="auto">
                    <path d="M0,0 L10,5 L0,10 Z" fill="#1b4079"/>
                </marker>
            </defs>
        </svg>
    </div>
</div>

<script>
let nodos = [];
let aristas = [];
let nodoSeleccionado = null;
let aristaSeleccionadaIdx = null;

const area = document.getElementById('area');
const svg = document.getElementById('svg');

window.onload = () => {
    const nSaved = JSON.parse(localStorage.getItem("nodos_coords")) || [];
    const aSaved = JSON.parse(localStorage.getItem("aristas")) || [];
    nSaved.forEach(n => crearNodo(n.nombre, n.x, n.y));
    aristas = aSaved;
    dibujarTodo();
};

function agregarNodo() {
    const nombre = document.getElementById('nodeName').value.trim();
    if (!nombre || nodos.some(n => n.nombre === nombre)) return alert("Nombre no válido");
    crearNodo(nombre, 100, 100);
    document.getElementById('nodeName').value = '';
    guardar();
}

function crearNodo(nombre, x, y) {
    const div = document.createElement('div');
    div.className = 'nodo';
    div.textContent = nombre;
    div.style.left = x + 'px';
    div.style.top = y + 'px';
    
    const obj = { nombre, x, y, el: div };
    
    div.onmousedown = (e) => {
        let movido = false;
        const mover = (ev) => {
            movido = true;
            const rect = area.getBoundingClientRect();
            obj.x = ev.clientX - rect.left;
            obj.y = ev.clientY - rect.top;
            div.style.left = obj.x + 'px';
            div.style.top = obj.y + 'px';
            dibujarTodo();
        };
        const soltar = () => {
            window.removeEventListener('mousemove', mover);
            window.removeEventListener('mouseup', soltar);
            if (!movido) clickNodo(obj);
            guardar();
        };
        window.addEventListener('mousemove', mover);
        window.addEventListener('mouseup', soltar);
    };
    
    area.appendChild(div);
    nodos.push(obj);
}

function clickNodo(obj) {
    if (!nodoSeleccionado) {
        nodoSeleccionado = obj;
        obj.el.classList.add('selected');
    } else {
        const peso = prompt("Peso de arista:", "1") || "1";
        aristas.push({ from: nodoSeleccionado.nombre, to: obj.nombre, peso: parseInt(peso) });
        nodoSeleccionado.el.classList.remove('selected');
        nodoSeleccionado = null;
        dibujarTodo();
        guardar();
    }
}

function dibujarTodo() {
    while (svg.lastChild && svg.lastChild.nodeName !== 'defs') svg.removeChild(svg.lastChild);
    
    aristas.forEach((a, idx) => {
        const n1 = nodos.find(n => n.nombre === a.from);
        const n2 = nodos.find(n => n.nombre === a.to);
        if (!n1 || !n2) return;

        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        
        let d, tx, ty;
        const dist = Math.sqrt((n2.x-n1.x)**2 + (n2.y-n1.y)**2) || 1;
        const ux = (n2.x-n1.x)/dist; const uy = (n2.y-n1.y)/dist;

        if (n1 === n2) { // Bucle
            d = `M ${n1.x-10} ${n1.y-20} A 20 20 0 1 1 ${n1.x+10} ${n1.y-20}`;
            tx = n1.x; ty = n1.y - 50;
        } else {
            const tieneInversa = aristas.some(ari => ari.from === n2.nombre && ari.to === n1.nombre);
            if (tieneInversa) {
                const mx = (n1.x+n2.x)/2 - uy*30;
                const my = (n1.y+n2.y)/2 + ux*30;
                d = `M ${n1.x} ${n1.y} Q ${mx} ${my} ${n2.x} ${n2.y}`;
                tx = mx; ty = my;
            } else {
                d = `M ${n1.x} ${n1.y} L ${n2.x} ${n2.y}`;
                tx = (n1.x+n2.x)/2 - uy*15; ty = (n1.y+n2.y)/2 + ux*15;
            }
        }

        path.setAttribute("d", d);
        path.setAttribute("stroke", "#1b4079");
        path.setAttribute("marker-end", "url(#arrow)");
        path.onclick = () => {
            aristaSeleccionadaIdx = idx;
            document.getElementById('btn-del-edge').style.display = 'block';
        };

        text.setAttribute("x", tx); text.setAttribute("y", ty);
        text.setAttribute("class", "label-peso");
        text.setAttribute("text-anchor", "middle");
        text.textContent = a.peso;
        text.onclick = () => {
            const p = prompt("Nuevo peso:", a.peso);
            if(p) { a.peso = parseInt(p); dibujarTodo(); guardar(); }
        };

        g.appendChild(path);
        g.appendChild(text);
        svg.appendChild(g);
    });
}

function borrarAristaSeleccionada() {
    if (aristaSeleccionadaIdx !== null) {
        aristas.splice(aristaSeleccionadaIdx, 1);
        aristaSeleccionadaIdx = null;
        document.getElementById('btn-del-edge').style.display = 'none';
        dibujarTodo(); guardar();
    }
}

function editarNombreNodo() {
    if (!nodoSeleccionado) return alert("Selecciona un nodo");
    const nuevo = document.getElementById('newNodeName').value.trim();
    if (!nuevo) return;
    aristas.forEach(a => {
        if (a.from === nodoSeleccionado.nombre) a.from = nuevo;
        if (a.to === nodoSeleccionado.nombre) a.to = nuevo;
    });
    nodoSeleccionado.nombre = nuevo;
    nodoSeleccionado.el.textContent = nuevo;
    nodoSeleccionado.el.classList.remove('selected');
    nodoSeleccionado = null;
    guardar(); dibujarTodo();
}

function guardar() {
    localStorage.setItem("nodos", JSON.stringify(nodos.map(n => n.nombre)));
    localStorage.setItem("nodos_coords", JSON.stringify(nodos.map(n => ({nombre: n.nombre, x: n.x, y: n.y}))));
    localStorage.setItem("aristas", JSON.stringify(aristas));
}

function guardarYIrMatriz() {
    guardar();
    window.location.href = 'matriz.html';
}

function limpiarTodo() {
    if(confirm("¿Borrar todo?")) {
        localStorage.clear();
        location.reload();
    }
}

function exportarJSON() {
    const data = { nodos: nodos.map(n => ({nombre: n.nombre, x: n.x, y: n.y})), aristas };
    const a = document.createElement('a');
    a.href = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(data));
    a.download = 'grafo.json'; a.click();
}

function importarJSON() {
    const input = document.createElement('input');
    input.type = 'file';
    input.onchange = e => {
        const reader = new FileReader();
        reader.onload = re => {
            const d = JSON.parse(re.target.result);
            localStorage.setItem("nodos_coords", JSON.stringify(d.nodos));
            localStorage.setItem("aristas", JSON.stringify(d.aristas));
            location.reload();
        };
        reader.readAsText(e.target.files[0]);
    };
    input.click();
}
</script>
</body>
</html>
