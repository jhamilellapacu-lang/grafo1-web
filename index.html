<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Grafo Profesional - Corregido</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-node: #470f70;
            --btn-color: #2196f3;
            --edge-up: #c26cf8;
            --edge-down: #bb20b3;
            --loop-color: #903495;
            --bg: #fdfdfd;
        }

        body { font-family: 'Comfortaa', cursive; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* SIDEBAR */
        #sidebar { width: 320px; background: white; padding: 20px; box-shadow: 4px 0 20px rgba(0,0,0,0.08); display: flex; flex-direction: column; gap: 12px; z-index: 100; }
        .step { padding: 12px; border: 1px solid #eee; border-radius: 15px; background: #fafafa; font-size: 0.85rem; }
        h1 { font-size: 1.3rem; color: var(--primary-node); text-align: center; margin: 0 0 10px 0; }
        
        input, button { width: 100%; padding: 10px; margin-top: 8px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; }
        button { background: var(--btn-color); color: white; border: none; cursor: pointer; font-weight: bold; }
        .danger { background: #ff5252; }

        /* CANVAS */
        #canvas-container { flex-grow: 1; padding: 25px; position: relative; }
        #area { width: 100%; height: 100%; background: #fff; border-radius: 25px; position: relative; border: 3px solid var(--btn-color); overflow: hidden; }

        .nodo {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--primary-node); color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; position: absolute;
            transform: translate(-50%, -50%); cursor: move;
            z-index: 10; border: 2px solid #fff; user-select: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
        .nodo.selected { box-shadow: 0 0 0 5px #4caf50; }

        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .label-group { pointer-events: all; cursor: pointer; }
        .label-rect { fill: white; stroke: #ddd; rx: 4; }
        .label-text { font-weight: bold; font-size: 12px; fill: #333; pointer-events: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>Diseña tu Grafo</h1>
    <div class="step">
        <input type="text" id="nodeName" placeholder="Nombre Nodo">
        <button onclick="agregarNodo()">Agregar Nodo</button>
    </div>
    <div class="step">
        <input type="number" id="edgeWeight" value="1" min="1">
        <p>1. Clic en Origen<br>2. Clic en Destino</p>
    </div>
    <div class="step">
        <b>Edición Pro:</b><br>
        • Doble clic en nodo para editar/borrar.<br>
        • Clic en número de arista para editar/borrar.
    </div>
    <button onclick="exportarJSON()">Descargar JSON</button>
    <button class="danger" onclick="limpiarTodo()">Borrar Lienzo</button>
    <button style="background: #4caf50; margin-top: auto;" onclick="window.location.href='matriz.html'">Ver Matriz</button>
</div>

<div id="canvas-container">
    <div id="area" onclick="canvasClick(event)">
        <svg id="svg">
            <defs>
                <marker id="arrow-up" markerWidth="10" markerHeight="10" refX="28" refY="5" orient="auto">
                    <path d="M0,0 L10,5 L0,10 Z" fill="#c26cf8"/>
                </marker>
                <marker id="arrow-down" markerWidth="10" markerHeight="10" refX="28" refY="5" orient="auto">
                    <path d="M0,0 L10,5 L0,10 Z" fill="#bb20b3"/>
                </marker>
                <marker id="arrow-loop" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
                    <path d="M0,0 L10,5 L0,10 Z" fill="#903495"/>
                </marker>
            </defs>
        </svg>
    </div>
</div>

<script>
let nodos = [];
let aristas = [];
let nodoSeleccionado = null;
let draggingNode = null;

const area = document.getElementById('area');
const svg = document.getElementById('svg');

function agregarNodo(x, y, nombre = null) {
    const name = nombre || document.getElementById('nodeName').value.trim();
    if (!name || nodos.some(n => n.nombre === name)) return;

    const posX = x || area.clientWidth / 2;
    const posY = y || area.clientHeight / 2;

    if (checkCollision(posX, posY)) return;

    const nodeObj = { nombre: name, x: posX, y: posY, el: null };
    crearElementoNodo(nodeObj);
    nodos.push(nodeObj);
    guardarLocal();
}

function crearElementoNodo(node) {
    const div = document.createElement('div');
    div.className = 'nodo';
    div.textContent = node.nombre;
    div.style.left = node.x + 'px';
    div.style.top = node.y + 'px';

    div.onmousedown = (e) => { draggingNode = node; };
    div.onclick = (e) => { e.stopPropagation(); seleccionarParaArista(node); };
    div.ondblclick = (e) => { 
        e.stopPropagation();
        const res = prompt("Editar nombre (o escribe 'borrar' para eliminar):", node.nombre);
        if (res === 'borrar') {
            nodos = nodos.filter(n => n !== node);
            aristas = aristas.filter(a => a.from !== node.nombre && a.to !== node.nombre);
            div.remove();
        } else if (res && !nodos.some(n => n.nombre === res)) {
            aristas.forEach(a => {
                if (a.from === node.nombre) a.from = res;
                if (a.to === node.nombre) a.to = res;
            });
            node.nombre = res;
            div.textContent = res;
        }
        dibujarAristas();
        guardarLocal();
    };

    area.appendChild(div);
    node.el = div;
}

document.onmousemove = (e) => {
    if (!draggingNode) return;
    const rect = area.getBoundingClientRect();
    let nx = e.clientX - rect.left;
    let ny = e.clientY - rect.top;
    if (!checkCollision(nx, ny, draggingNode)) {
        draggingNode.x = nx; draggingNode.y = ny;
        draggingNode.el.style.left = nx + 'px';
        draggingNode.el.style.top = ny + 'px';
        dibujarAristas();
    }
};
document.onmouseup = () => { if(draggingNode) guardarLocal(); draggingNode = null; };

function checkCollision(x, y, ignore = null) {
    return nodos.some(n => n !== ignore && Math.sqrt((n.x-x)**2 + (n.y-y)**2) < 70);
}

function seleccionarParaArista(node) {
    if (!nodoSeleccionado) {
        nodoSeleccionado = node;
        node.el.classList.add('selected');
    } else {
        const peso = Math.abs(parseInt(document.getElementById('edgeWeight').value)) || 1;
        aristas.push({ from: nodoSeleccionado.nombre, to: node.nombre, peso });
        nodoSeleccionado.el.classList.remove('selected');
        nodoSeleccionado = null;
        dibujarAristas();
        guardarLocal();
    }
}

function dibujarAristas() {
    while (svg.lastChild && svg.lastChild.nodeName !== 'defs') svg.removeChild(svg.lastChild);
    aristas.forEach((a, idx) => {
        const n1 = nodos.find(n => n.nombre === a.from);
        const n2 = nodos.find(n => n.nombre === a.to);
        if (!n1 || !n2) return;

        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        let d, lx, ly, color, marker;

        if (n1 === n2) {
            color = "var(--loop-color)";
            marker = "url(#arrow-loop)";
            d = `M ${n1.x-5} ${n1.y-25} A 15 15 0 1 1 ${n1.x+5} ${n1.y-25}`;
            lx = n1.x; ly = n1.y - 55;
        } else {
            const tieneInversa = aristas.some(x => x.from === a.to && x.to === a.from);
            color = (n1.nombre <= n2.nombre) ? "var(--edge-up)" : "var(--edge-down)";
            marker = (n1.nombre <= n2.nombre) ? "url(#arrow-up)" : "url(#arrow-down)";
            
            if (tieneInversa) {
                const mx = (n1.x + n2.x)/2, my = (n1.y + n2.y)/2;
                const dx = n2.x - n1.x, dy = n2.y - n1.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const ox = -dy/dist * 25, oy = dx/dist * 25;
                d = `M ${n1.x} ${n1.y} Q ${mx+ox} ${my+oy} ${n2.x} ${n2.y}`;
                lx = mx+ox; ly = my+oy;
            } else {
                d = `M ${n1.x} ${n1.y} L ${n2.x} ${n2.y}`;
                lx = (n1.x + n2.x)/2; ly = (n1.y + n2.y)/2;
            }
        }

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", d); path.setAttribute("stroke", color);
        path.setAttribute("fill", "none"); path.setAttribute("stroke-width", "3");
        path.setAttribute("marker-end", marker);

        const lGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
        lGroup.setAttribute("class", "label-group");
        lGroup.onclick = () => {
            const res = prompt("Nuevo peso (o 'borrar'):", a.peso);
            if (res === 'borrar') aristas.splice(idx, 1);
            else if (!isNaN(parseInt(res))) a.peso = Math.abs(parseInt(res));
            dibujarAristas(); guardarLocal();
        };

        const r = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        r.setAttribute("x", lx-12); r.setAttribute("y", ly-10); r.setAttribute("width", "24"); r.setAttribute("height", "18"); r.setAttribute("class", "label-rect");
        const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t.setAttribute("x", lx); t.setAttribute("y", ly+4); t.setAttribute("text-anchor", "middle"); t.setAttribute("class", "label-text");
        t.textContent = a.peso;

        lGroup.append(r, t); g.append(path, lGroup); svg.appendChild(g);
    });
}

function canvasClick(e) { if(e.target.id === 'area') { const r = area.getBoundingClientRect(); agregarNodo(e.clientX-r.left, e.clientY-r.top); } }
function guardarLocal() { localStorage.setItem("nodos_v2", JSON.stringify(nodos.map(n=>({nombre:n.nombre, x:n.x, y:n.y})))); localStorage.setItem("aristas_v2", JSON.stringify(aristas)); }
function limpiarTodo() { if(confirm("¿Borrar todo?")) { localStorage.clear(); location.reload(); } }
window.onload = () => {
    const n = JSON.parse(localStorage.getItem("nodos_v2"));
    const a = JSON.parse(localStorage.getItem("aristas_v2"));
    if(n) n.forEach(d => agregarNodo(d.x, d.y, d.nombre));
    if(a) { aristas = a; dibujarAristas(); }
};
</script>
</body>
</html>
