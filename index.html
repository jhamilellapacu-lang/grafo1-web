<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Graph Designer</title>
<style>
body { margin:0; display:flex; height:100vh; font-family:Arial; }
#sidebar { width:300px; padding:20px; background:#f4f4f4; }
#area { flex:1; position:relative; background:white; }
.nodo{
  width:50px;height:50px;border-radius:50%;
  background:#1b4079;color:white;
  display:flex;align-items:center;justify-content:center;
  position:absolute;transform:translate(-50%,-50%);
  cursor:pointer;font-weight:bold;
}
svg{position:absolute;width:100%;height:100%;}
button,input{width:100%;margin-top:10px;padding:8px;}
</style>
</head>
<body>

<div id="sidebar">
<h2>Editor de Grafos</h2>

<input id="nodeName" placeholder="Nombre nodo">
<button onclick="agregarNodo()">Agregar Nodo</button>

<input id="edgeWeight" type="number" value="1">
<p>Haz clic en 2 nodos</p>

<button onclick="limpiarTodo()">Limpiar</button>
<button onclick="window.location.href='matriz.html'">Ver Matriz</button>
</div>

<div id="area">
<svg id="svg"></svg>
</div>

<script>
let nodos=[];
let aristas=[];
let nodoSeleccionado=null;

const area=document.getElementById("area");
const svg=document.getElementById("svg");

/* =======================
   GUARDAR / CARGAR
======================= */
function guardarDatos(){
localStorage.setItem("grafoData",JSON.stringify({
nodos:nodos.map(n=>({nombre:n.nombre,x:n.x,y:n.y})),
aristas:aristas
}));
}

function cargarDatos(){
const data=JSON.parse(localStorage.getItem("grafoData"));
if(!data) return;

nodos=[];
aristas=data.aristas||[];
svg.innerHTML="";

data.nodos.forEach(n=>{
const div=document.createElement("div");
div.className="nodo";
div.textContent=n.nombre;
div.style.left=n.x+"px";
div.style.top=n.y+"px";

const obj={nombre:n.nombre,x:n.x,y:n.y,el:div};
div.onclick=()=>clickNodo(obj);

area.appendChild(div);
nodos.push(obj);
habilitarMovimiento(obj);
});

actualizarAristas();
}

/* =======================
   NODOS
======================= */
function agregarNodo(){
const nombre=document.getElementById("nodeName").value.trim();
if(!nombre||nodos.some(n=>n.nombre===nombre))
return alert("Nombre inválido");

const x=Math.random()*(area.clientWidth-100)+50;
const y=Math.random()*(area.clientHeight-100)+50;

const div=document.createElement("div");
div.className="nodo";
div.textContent=nombre;
div.style.left=x+"px";
div.style.top=y+"px";

const obj={nombre,x,y,el:div};
div.onclick=()=>clickNodo(obj);

area.appendChild(div);
nodos.push(obj);
habilitarMovimiento(obj);
guardarDatos();
}

/* =======================
   CLICK NODOS
======================= */
function clickNodo(nodo){
if(!nodoSeleccionado){
nodoSeleccionado=nodo;
nodo.el.style.background="#ff9800";
}else{
const peso=parseInt(document.getElementById("edgeWeight").value||1);
aristas.push({from:nodoSeleccionado.nombre,to:nodo.nombre,peso});
nodoSeleccionado.el.style.background="#1b4079";
nodoSeleccionado=null;
actualizarAristas();
guardarDatos();
}
}

/* =======================
   ARISTAS
======================= */
function actualizarAristas(){
svg.innerHTML="";
aristas.forEach(a=>{
const n1=nodos.find(n=>n.nombre===a.from);
const n2=nodos.find(n=>n.nombre===a.to);
if(!n1||!n2) return;

const line=document.createElementNS("http://www.w3.org/2000/svg","line");
line.setAttribute("x1",n1.x);
line.setAttribute("y1",n1.y);
line.setAttribute("x2",n2.x);
line.setAttribute("y2",n2.y);
line.setAttribute("stroke","#2d5a27");
line.setAttribute("stroke-width","2");

const text=document.createElementNS("http://www.w3.org/2000/svg","text");
text.setAttribute("x",(n1.x+n2.x)/2);
text.setAttribute("y",(n1.y+n2.y)/2);
text.setAttribute("text-anchor","middle");
text.textContent=a.peso;

svg.appendChild(line);
svg.appendChild(text);
});
}

/* =======================
   DRAG
======================= */
function habilitarMovimiento(nodo){
let offsetX,offsetY,mov=false;

nodo.el.addEventListener("mousedown",e=>{
mov=true;
offsetX=e.clientX-nodo.x;
offsetY=e.clientY-nodo.y;
});

document.addEventListener("mousemove",e=>{
if(!mov) return;
nodo.x=e.clientX-offsetX;
nodo.y=e.clientY-offsetY;
nodo.el.style.left=nodo.x+"px";
nodo.el.style.top=nodo.y+"px";
actualizarAristas();
});

document.addEventListener("mouseup",()=>{
if(mov) guardarDatos();
mov=false;
});
}

/* =======================
   LIMPIAR
======================= */
function limpiarTodo(){
nodos.forEach(n=>n.el.remove());
nodos=[];
aristas=[];
svg.innerHTML="";
localStorage.removeItem("grafoData");
}

window.onload=cargarDatos;
</script>
</body>
</html>
