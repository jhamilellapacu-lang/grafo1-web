<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Matriz de Adyacencia Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #470f70; --accent: #2196f3; --bg: #f0f4f8; }
        body { font-family: 'Comfortaa', sans-serif; background: var(--bg); padding: 40px; }
        .card { background: white; padding: 35px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); max-width: 1000px; margin: auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h1 { color: var(--primary); margin: 0; }
        button { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 15px; overflow: hidden; border: 1px solid #eee; }
        th, td { padding: 15px; text-align: center; border: 1px solid #edf2f7; }
        th { background: var(--primary); color: white; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        
        .row-label { background: #f7fafc; font-weight: bold; color: var(--primary); }
        .sum-cell { background: #e3f2fd; font-weight: bold; color: var(--accent); }
        .highlight { background: #fff9c4 !important; border: 2px solid #fbc02d; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 30px; }
        .stat-box { background: var(--accent); color: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(33, 150, 243, 0.2); }
        .stat-box span { display: block; font-size: 2rem; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>
<div class="card">
    <header>
        <h1>Matriz de Adyacencia</h1>
        <button onclick="window.location.href='index.html'">⬅ Regresar al Editor</button>
    </header>
    <div id="table-container"></div>
    <div class="stats-grid" id="stats-container"></div>
</div>

<script>
    function render() {
        const nodosData = JSON.parse(localStorage.getItem("g_nodos")) || [];
        const aristasData = JSON.parse(localStorage.getItem("g_aristas")) || [];
        const ids = nodosData.map(n => n.id);
        const size = ids.length;

        if (size === 0) {
            document.getElementById('table-container').innerHTML = "<p style='text-align:center;color:#666;'>No hay nodos en el grafo.</p>";
            return;
        }

        let m = Array.from({length: size}, () => Array(size).fill(0));
        aristasData.forEach(edge => {
            const i = ids.indexOf(edge.from), j = ids.indexOf(edge.to);
            if(i !== -1 && j !== -1) m[i][j] = edge.peso;
        });

        // Cálculos
        let sumF = m.map(r => r.reduce((a,b)=>a+b, 0));
        let cantF = m.map(r => r.filter(x=>x>0).length);
        let sumC = Array(size).fill(0), cantC = Array(size).fill(0);
        
        for(let j=0; j<size; j++) {
            for(let i=0; i<size; i++) {
                sumC[j] += m[i][j];
                if(m[i][j] > 0) cantC[j]++;
            }
        }

        let mxSF = Math.max(...sumF, 0), mxCF = Math.max(...cantF, 0);
        let mxSC = Math.max(...sumC, 0), mxCC = Math.max(...cantC, 0);

        // Render Tabla
        let html = `<table><thead><tr><th>Nodos</th>` + ids.map(x=>`<th>${x}</th>`).join('') + `<th>Suma Σ</th><th>Cant #</th></tr></thead><tbody>`;
        m.forEach((row, i) => {
            html += `<tr><td class="row-label">${ids[i]}</td>` + row.map(v=>`<td>${v}</td>`).join('') + 
            `<td class="sum-cell ${sumF[i]===mxSF && mxSF>0?'highlight':''}">${sumF[i]}</td>` +
            `<td class="sum-cell ${cantF[i]===mxCF && mxCF>0?'highlight':''}">${cantF[i]}</td></tr>`;
        });
        
        // Totales Inferiores
        html += `<tr><td class="row-label">SUMA Σ</td>` + sumC.map(v=>`<td class="sum-cell ${v===mxSC && mxSC>0?'highlight':''}">${v}</td>`).join('') + `<td colspan="2"></td></tr>`;
        html += `<tr><td class="row-label">CANT #</td>` + cantC.map(v=>`<td class="sum-cell ${v===mxCC && mxCC>0?'highlight':''}">${v}</td>`).join('') + `<td colspan="2"></td></tr></tbody></table>`;
        
        document.getElementById('table-container').innerHTML = html;

        // Render Dashboard
        document.getElementById('stats-container').innerHTML = `
            <div class="stat-box">Max Suma Fila<span>${mxSF}</span></div>
            <div class="stat-box">Max Cant Fila<span>${mxCF}</span></div>
            <div class="stat-box">Max Suma Col<span>${mxSC}</span></div>
            <div class="stat-box">Max Cant Col<span>${mxCC}</span></div>`;
    }
    window.onload = render;
</script>
</body>
</html>
