<style>
  .nodo {
    user-select: none; /* Evita seleccionar texto al arrastrar */
    touch-action: none; /* Mejora soporte en móviles */
  }
  .nodo:active { cursor: grabbing; }
  
  /* Estilo para las líneas al pasar el mouse */
  path { cursor: pointer; pointer-events: auto !important; }
  path:hover { stroke-width: 6px; stroke: #ff9800; }
  .edge-selected { stroke: #e53e3e !important; stroke-width: 6px !important; }
</style>

<script>
let nodos = [];
let aristas = [];
let nodoSeleccionado = null;
let aristaSeleccionada = null;
let nodoArrastrándose = null; // Para el Drag & Drop

const area = document.getElementById('area');
const svg = document.getElementById('svg');

// --- CARGA Y RENDERIZADO INICIAL ---
window.onload = () => {
    const backupNodos = JSON.parse(localStorage.getItem("nodos_full")) || [];
    const backupAristas = JSON.parse(localStorage.getItem("aristas")) || [];
    
    backupNodos.forEach(n => crearElementoNodo(n.nombre, n.x, n.y));
    aristas = backupAristas;
    actualizarSVG();
};

function crearElementoNodo(nombre, x, y) {
    const div = document.createElement('div');
    div.className = 'nodo';
    div.textContent = nombre;
    div.style.left = x + 'px';
    div.style.top = y + 'px';
    
    const nodoObj = { nombre, x, y, el: div };

    // EVENTOS DE CLICK Y ARRASTRE
    div.onmousedown = (e) => iniciarArrastre(e, nodoObj);
    div.onclick = (e) => {
        if (e.defaultPrevented) return; // Si se arrastró, no cuenta como click simple
        manejarClickNodo(nodoObj);
    };

    area.appendChild(div);
    nodos.push(nodoObj);
}

// --- LÓGICA DE ARRASTRE (DRAG & DROP) ---
function iniciarArrastre(e, nodo) {
    nodoArrastrándose = nodo;
    let movido = false;

    const mover = (evento) => {
        movido = true;
        const rect = area.getBoundingClientRect();
        nodo.x = evento.clientX - rect.left;
        nodo.y = evento.clientY - rect.top;
        
        nodo.el.style.left = nodo.x + 'px';
        nodo.el.style.top = nodo.y + 'px';
        
        actualizarSVG(); // Redibuja aristas mientras mueves
    };

    const detener = () => {
        window.removeEventListener('mousemove', mover);
        window.removeEventListener('mouseup', detener);
        if (movido) {
            guardarDatos();
            // Evitamos que el evento 'click' se dispare si hubo movimiento
            setTimeout(() => nodoArrastrándose = null, 50);
        } else {
            nodoArrastrándose = null;
        }
    };

    window.addEventListener('mousemove', mover);
    window.addEventListener('mouseup', detener);
}

// --- LÓGICA DE GRAFOS ---
function manejarClickNodo(nodo) {
    if (nodoArrastrándose) return; // Bloquear si viene de un drag

    if (!nodoSeleccionado) {
        nodoSeleccionado = nodo;
        nodo.el.classList.add('selected');
    } else {
        const peso = prompt("Ingrese el peso de la arista:", "1") || "1";
        aristas.push({ from: nodoSeleccionado.nombre, to: nodo.nombre, peso: parseInt(peso) });
        nodoSeleccionado.el.classList.remove('selected');
        nodoSeleccionado = null;
        actualizarSVG();
        guardarDatos();
    }
}

function actualizarSVG() {
    // Limpiar SVG excepto defs (flechas)
    while (svg.lastChild && svg.lastChild.nodeName !== 'defs') svg.removeChild(svg.lastChild);

    aristas.forEach((a, index) => {
        const n1 = nodos.find(n => n.nombre === a.from);
        const n2 = nodos.find(n => n.nombre === a.to);
        if (!n1 || !n2) return;

        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        const esBucle = n1 === n2;
        const esMenorAMayor = n1.nombre.localeCompare(n2.nombre, undefined, {numeric: true}) <= 0;
        const color = esMenorAMayor ? "#2d5a27" : "#a8d5a2";
        const marker = esMenorAMayor ? "url(#arrow-dark)" : "url(#arrow-light)";

        let d, tx, ty;
        if (esBucle) {
            d = `M ${n1.x - 12} ${n1.y - 22} A 18 18 0 1 1 ${n1.x + 8} ${n1.y - 24}`;
            tx = n1.x; ty = n1.y - 58;
        } else {
            const dx = n2.x - n1.x; const dy = n2.y - n1.y;
            const dist = Math.sqrt(dx*dx + dy*dy) || 1;
            const ux = dx/dist; const uy = dy/dist;
            
            // Si hay arista de ida y vuelta, curvamos un poco
            const inversa = aristas.some(ari => ari.from === n2.nombre && ari.to === n1.nombre);
            if (inversa && n1 !== n2) {
                const midX = (n1.x + n2.x) / 2 - uy * 30;
                const midY = (n1.y + n2.y) / 2 + ux * 30;
                d = `M ${n1.x + ux*25} ${n1.y + uy*25} Q ${midX} ${midY} ${n2.x - ux*28} ${n2.y - uy*28}`;
                tx = midX; ty = midY;
            } else {
                d = `M ${n1.x + ux*25} ${n1.y + uy*25} L ${n2.x - ux*28} ${n2.y - uy*28}`;
                tx = (n1.x + n2.x) / 2 - uy * 20; ty = (n1.y + n2.y) / 2 + ux * 20;
            }
        }

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", d);
        path.setAttribute("stroke", color);
        path.setAttribute("fill", "none");
        path.setAttribute("stroke-width", "3");
        path.setAttribute("marker-end", marker);
        
        // CLICK PARA SELECCIONAR/BORRAR ARISTA
        path.onclick = (e) => {
            e.stopPropagation();
            aristaSeleccionada = { index, el: g };
            document.querySelectorAll('path').forEach(p => p.classList.remove('edge-selected'));
            path.classList.add('edge-selected');
            document.getElementById('btn-del-edge').style.display = 'block';
        };

        const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
        txt.setAttribute("x", tx); txt.setAttribute("y", ty);
        txt.setAttribute("fill", color);
        txt.setAttribute("class", "label-peso");
        txt.setAttribute("text-anchor", "middle");
        txt.textContent = a.peso;
        
        // CLICK PARA EDITAR PESO
        txt.onclick = () => {
            const p = prompt("Nuevo peso:", a.peso);
            if(p) { a.peso = parseInt(p); actualizarSVG(); guardarDatos(); }
        };

        g.appendChild(path);
        g.appendChild(txt);
        svg.appendChild(g);
    });
}

function borrarAristaSeleccionada() {
    if (aristaSeleccionada !== null) {
        aristas.splice(aristaSeleccionada.index, 1);
        aristaSeleccionada = null;
        document.getElementById('btn-del-edge').style.display = 'none';
        actualizarSVG();
        guardarDatos();
    }
}

function agregarNodo() {
  const nombre = document.getElementById('nodeName').value.trim();
  if (!nombre || nodos.some(n => n.nombre === nombre)) return alert("Nombre inválido");
  crearElementoNodo(nombre, 150, 150);
  actualizarSVG();
  guardarDatos();
  document.getElementById('nodeName').value = '';
}

function guardarDatos() {
  localStorage.setItem("nodos", JSON.stringify(nodos.map(n => n.nombre)));
  localStorage.setItem("nodos_full", JSON.stringify(nodos.map(n => ({nombre: n.nombre, x: n.x, y: n.y}))));
  localStorage.setItem("aristas", JSON.stringify(aristas));
}

function exportarJSON() {
    const data = { nodos: nodos.map(n => ({nombre: n.nombre, x: n.x, y: n.y})), aristas };
    const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'grafo.json'; a.click();
}

function importarJSON() {
    const input = document.createElement('input');
    input.type = 'file';
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = re => {
            const data = JSON.parse(re.target.result);
            localStorage.setItem("nodos_full", JSON.stringify(data.nodos));
            localStorage.setItem("nodos", JSON.stringify(data.nodos.map(n => n.nombre)));
            localStorage.setItem("aristas", JSON.stringify(data.aristas));
            location.reload();
        };
        reader.readAsText(file);
    };
    input.click();
}

function limpiarTodo() {
    if(confirm("¿Seguro que quieres borrar todo?")) {
        nodos.forEach(n => n.el.remove());
        nodos = []; aristas = [];
        actualizarSVG();
        localStorage.clear();
    }
}
</script>
