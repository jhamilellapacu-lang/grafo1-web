<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Matriz de Adyacencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Comfortaa', cursive; background: #f0f4f8; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 90%; overflow-x: auto; }
        h1 { color: #1b4079; }
        table { border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #cbd5e0; padding: 15px; text-align: center; min-width: 50px; }
        th { background: #1b4079; color: white; }
        tr:nth-child(even) { background: #f8fafc; }
        .back-btn { margin-bottom: 20px; padding: 10px 20px; background: #1b4079; color: white; border: none; border-radius: 8px; cursor: pointer; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">⬅ Volver al Editor</a>
    <div class="card">
        <h1>Matriz de Adyacencia</h1>
        <div id="contenedor-matriz"></div>
    </div>

    <script>
        window.onload = () => {
            const dataRaw = localStorage.getItem("grafo");
            if (!dataRaw) {
                document.getElementById('contenedor-matriz').innerHTML = "No hay datos del grafo.";
                return;
            }
            const data = JSON.parse(dataRaw);
            const nombres = data.nodos.map(n => n.nombre);
            
            if (nombres.length === 0) {
                document.getElementById('contenedor-matriz').innerHTML = "El grafo está vacío.";
                return;
            }

            let html = '<table><thead><tr><th></th>';
            nombres.forEach(n => html += `<th>${n}</th>`);
            html += '</tr></thead><tbody>';

            nombres.forEach(fila => {
                html += `<tr><th>${fila}</th>`;
                nombres.forEach(columna => {
                    // Buscar si hay una arista entre fila y columna
                    const arista = data.aristas.find(a => a.from === fila && a.to === columna);
                    html += `<td>${arista ? arista.peso : 0}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            document.getElementById('contenedor-matriz').innerHTML = html;
        };
    </script>
</body>
</html>
